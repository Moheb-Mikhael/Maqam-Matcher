<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maqam Matcher</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --primary: #2c3e50;
  --accent: #b8860b;
  --accent-light: #f0e6d0;
  --selected: #27ae60;
  --selected-bg: #d4edda;
  --text: #2d3436;
  --muted: #95a5a6;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
#app { max-width: 800px; margin: 0 auto; padding: 24px 16px 48px; }
header {
  text-align: center;
  padding: 32px 16px 24px;
}
header h1 {
  font-size: 28px;
  color: var(--primary);
  margin-bottom: 6px;
}
header h1 span { color: var(--accent); }
header p { color: var(--muted); font-size: 15px; }

.section-title {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 12px;
}

#controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 20px;
  padding: 16px;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.controls-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
#root-filter {
  display: flex;
  align-items: center;
  gap: 8px;
}
#root-filter label { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }
#root-filter select {
  padding: 6px 12px;
  border: 1.5px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
  background: white;
  cursor: pointer;
}

/* Toggle Switch Styles */
.toggle-container {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
}
.switch {
  position: relative;
  display: inline-block;
  width: 46px;
  height: 24px;
}
.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}
.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: .4s;
  border-radius: 24px;
}
.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}
input:checked + .slider {
  background-color: var(--accent);
}
input:checked + .slider:before {
  transform: translateX(22px);
}

#selection-area {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  width: 100%;
  margin-top: 8px;
  padding-top: 12px;
  border-top: 1px solid #eee;
}
#selection-text { font-size: 14px; color: var(--muted); }
#selection-notes {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  flex: 1;
}
.selection-note {
  display: inline-block;
  padding: 2px 8px;
  background: var(--selected-bg);
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  color: #1e7e34;
}
#clear-btn {
  padding: 6px 16px;
  border: 1.5px solid #e74c3c;
  border-radius: 6px;
  background: white;
  color: #e74c3c;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.15s;
  white-space: nowrap;
}
#clear-btn:hover { background: #fdf0ef; }
.hidden { display: none !important; }

#note-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  padding: 20px;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 24px;
}
.note-btn {
  width: 60px;
  height: 60px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.note-btn:hover { border-color: var(--accent); }
.note-btn.selected {
  border-color: var(--selected);
  background: var(--selected-bg);
  color: #1e7e34;
  box-shadow: 0 0 0 2px rgba(39,174,96,0.2);
}
.note-btn .sub {
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  margin-top: 1px;
  line-height: 1;
}
.note-btn.selected .sub { color: #1e7e34; }
.note-btn.quarter { border-color: #d4c9a8; }
.note-btn.quarter.selected { border-color: var(--selected); }
.note-btn.special { border-color: #c8b8d8; }
.note-btn.special.selected { border-color: var(--selected); }
.note-btn.natural { background: #fafaf8; }

#results {
  padding: 20px;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
#results h2 {
  font-size: 18px;
  color: var(--primary);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent-light);
}
#results-count {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
}
#results-list { display: flex; flex-direction: column; gap: 10px; }
.placeholder {
  color: var(--muted);
  font-size: 15px;
  text-align: center;
  padding: 40px 16px;
  line-height: 1.6;
}
.result-card {
  padding: 14px 16px;
  border: 1.5px solid #eee;
  border-radius: 8px;
  transition: 0.12s;
}
.result-card:hover { border-color: var(--accent); }
.result-card .family-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  background: var(--accent-light);
  color: var(--accent);
  margin-bottom: 6px;
}
.result-card .name { font-size: 17px; font-weight: 700; color: var(--primary); }
.result-card .root { font-size: 13px; color: var(--muted); margin-left: 8px; }
.result-card .scale {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.result-card .scale-note {
  padding: 2px 8px;
  background: #f0f0f0;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.result-card .scale-note.highlight {
  background: #d4edda;
  color: #1e7e34;
}

@media (max-width: 480px) {
  #app { padding: 12px 8px 32px; }
  header { padding: 20px 8px 16px; }
  header h1 { font-size: 22px; }
  #controls { padding: 12px; flex-direction: column; align-items: stretch; }
  .controls-group { justify-content: space-between; width: 100%; }
  #note-grid { padding: 12px; gap: 6px; }
  .note-btn { width: 50px; height: 50px; font-size: 12px; }
  .note-btn .sub { font-size: 8px; }
  .result-card { padding: 12px; }
}
</style>
</head>
<body>
<div id="app">

<header>
  <h1>Maqam <span>Matcher</span></h1>
  <p>Select the notes you're playing to find matching Maqams</p>
</header>

<div id="controls">
    <div class="controls-group">
      <div id="root-filter">
        <label for="root-select">Root:</label>
        <select id="root-select">
          <option value="">Any root</option>
        </select>
      </div>
      
      <div class="toggle-container">
        <span>Do Re Mi</span>
        <label class="switch">
          <input type="checkbox" id="notation-toggle">
          <span class="slider"></span>
        </label>
        <span>C D E</span>
      </div>
    </div>

  <div id="selection-area">
    <span id="selection-text" class="hidden"></span>
    <div id="selection-notes"></div>
    <button id="clear-btn" class="hidden">Clear All</button>
  </div>
</div>

<section id="note-grid"></section>

<section id="results">
  <h2>Matching Maqams</h2>
  <div id="results-list">
    <p class="placeholder">Select notes to find matching Maqams.</p>
  </div>
</section>

</div>

<script>
// Base Data with generic identifiers
const MAQAMS = [
  {"family":"Ajam","name":"Ajam (Do)","root":"C","notes":["C","D","E","F","G","A","B"]},
  {"family":"Ajam","name":"Ajam (Re)","root":"D","notes":["D","E","F#","G","A","B","C#"]},
  {"family":"Ajam","name":"Ajam (Mi♭)","root":"Eb","notes":["Eb","F","G","Ab","Bb","C","D"]},
  {"family":"Ajam","name":"Ajam (Fa)","root":"F","notes":["F","G","A","Bb","C","D","E"]},
  {"family":"Ajam","name":"Ajam (Sol)","root":"G","notes":["G","A","B","C","D","E","F#"]},
  {"family":"Ajam","name":"Ajam (Si♭)","root":"Bb","notes":["Bb","C","D","Eb","F","G","A"]},
  {"family":"Nahawand","name":"Nahawand (Do)","root":"C","notes":["C","D","Eb","F","G","Ab","Bb"]},
  {"family":"Nahawand","name":"Nahawand (Re)","root":"D","notes":["D","E","F","G","A","Bb","C"]},
  {"family":"Nahawand","name":"Nahawand (Mi)","root":"E","notes":["E","F#","G","A","B","C","D"]},
  {"family":"Nahawand","name":"Nahawand (Fa)","root":"F","notes":["F","G","Ab","Bb","C","Db","Eb"]},
  {"family":"Nahawand","name":"Nahawand (Sol)","root":"G","notes":["G","A","Bb","C","D","Eb","F"]},
  {"family":"Nahawand","name":"Nahawand (La)","root":"A","notes":["A","B","C","D","E","F","G"]},
  {"family":"Kurd","name":"Kurd (Do)","root":"C","notes":["C","Db","Eb","F","G","Ab","Bb"]},
  {"family":"Kurd","name":"Kurd (Re)","root":"D","notes":["D","Eb","F","G","A","Bb","C"]},
  {"family":"Kurd","name":"Kurd (Mi)","root":"E","notes":["E","F","G","A","B","C","D"]},
  {"family":"Kurd","name":"Kurd (Sol)","root":"G","notes":["G","Ab","Bb","C","D","Eb","F"]},
  {"family":"Kurd","name":"Kurd (La)","root":"A","notes":["A","Bb","C","D","E","F","G"]},
  {"family":"Kurd","name":"Kurd (Si)","root":"B","notes":["B","C","D","E","F#","G","A"]},
  {"family":"Rast","name":"Rast (Do)","root":"C","notes":["C","D","Ehb","F","G","A","Bhb"]},
  {"family":"Rast","name":"Rast (Fa)","root":"F","notes":["F","G","Ahb","Bb","C","D","Ehb"]},
  {"family":"Rast","name":"Rast (Sol)","root":"G","notes":["G","A","Bhb","C","D","Ehb","F"]},
  {"family":"Rast","name":"Rast (Re)","root":"D","notes":["D","E","Fhs","G","A","B","Chs"]},
  {"family":"Rast","name":"Rast (La)","root":"A","notes":["A","B","Chs","D","E","Fhs","G"]},
  {"family":"Bayati","name":"Bayati (Do)","root":"C","notes":["C","Dhb","Eb","F","G","Ab","Bb"]},
  {"family":"Bayati","name":"Bayati (Re)","root":"D","notes":["D","Ehb","F","G","A","Bb","C"]},
  {"family":"Bayati","name":"Bayati (Sol)","root":"G","notes":["G","Ahb","Bb","C","D","Eb","F"]},
  {"family":"Bayati","name":"Bayati (La)","root":"A","notes":["A","Bhb","C","D","E","F","G"]},
  {"family":"Hijaz","name":"Hijaz (Do)","root":"C","notes":["C","Db","E","F","G","Ab","Bb"]},
  {"family":"Hijaz","name":"Hijaz (Re)","root":"D","notes":["D","Eb","F#","G","A","Bb","C"]},
  {"family":"Hijaz","name":"Hijaz (Mi)","root":"E","notes":["E","F","G#","A","B","C","D"]},
  {"family":"Hijaz","name":"Hijaz (Sol)","root":"G","notes":["G","Ab","B","C","D","Eb","F"]},
  {"family":"Hijaz","name":"Hijaz (La)","root":"A","notes":["A","Bb","C#","D","E","F","G"]},
  {"family":"Saba","name":"Saba (Do)","root":"C","notes":["C","Dhb","Eb","Fb","G","Ab","Bb"]},
  {"family":"Saba","name":"Saba (Re)","root":"D","notes":["D","Ehb","F","Gb","A","Bb","C"]},
  {"family":"Saba","name":"Saba (Sol)","root":"G","notes":["G","Ahb","Bb","Cb","D","Eb","F"]},
  {"family":"Saba","name":"Saba (La)","root":"A","notes":["A","Bhb","C","Db","E","F","G"]},
  {"family":"Sikah","name":"Sikah (Mi½♭)","root":"Ehb","notes":["Ehb","F","G","A","Bhb","C","D"]},
  {"family":"Sikah","name":"Sikah (Si½♭)","root":"Bhb","notes":["Bhb","C","D","Ehb","F","G","A"]},
  {"family":"Sikah","name":"Sikah (La½♭)","root":"Ahb","notes":["Ahb","Bb","C","Dhb","Eb","F","G"]}
];

// Mapping structure to handle both notations
const ALL_NOTES = [
  { id: 'C',   cls: 'natural', sub: '',    solfege: 'Do',  western: 'C' },
  { id: 'C#',  cls: 'sharp',   sub: '♯',   solfege: 'Do',  western: 'C' },
  { id: 'Chs', cls: 'quarter', sub: '½♯',  solfege: 'Do',  western: 'C' },
  { id: 'Db',  cls: 'flat',    sub: '♭',   solfege: 'Re',  western: 'D' },
  { id: 'D',   cls: 'natural', sub: '',    solfege: 'Re',  western: 'D' },
  { id: 'Dhb', cls: 'quarter', sub: '½♭',  solfege: 'Re',  western: 'D' },
  { id: 'Eb',  cls: 'flat',    sub: '♭',   solfege: 'Mi',  western: 'E' },
  { id: 'Ehb', cls: 'quarter', sub: '½♭',  solfege: 'Mi',  western: 'E' },
  { id: 'E',   cls: 'natural', sub: '',    solfege: 'Mi',  western: 'E' },
  { id: 'Fb',  cls: 'special', sub: '♭',   solfege: 'Fa',  western: 'F' },
  { id: 'F',   cls: 'natural', sub: '',    solfege: 'Fa',  western: 'F' },
  { id: 'F#',  cls: 'sharp',   sub: '♯',   solfege: 'Fa',  western: 'F' },
  { id: 'Fhs', cls: 'quarter', sub: '½♯',  solfege: 'Fa',  western: 'F' },
  { id: 'Gb',  cls: 'special', sub: '♭',   solfege: 'Sol', western: 'G' },
  { id: 'G',   cls: 'natural', sub: '',    solfege: 'Sol', western: 'G' },
  { id: 'G#',  cls: 'sharp',   sub: '♯',   solfege: 'Sol', western: 'G' },
  { id: 'Ab',  cls: 'flat',    sub: '♭',   solfege: 'La',  western: 'A' },
  { id: 'Ahb', cls: 'quarter', sub: '½♭',  solfege: 'La',  western: 'A' },
  { id: 'A',   cls: 'natural', sub: '',    solfege: 'La',  western: 'A' },
  { id: 'Bb',  cls: 'flat',    sub: '♭',   solfege: 'Si',  western: 'B' },
  { id: 'Bhb', cls: 'quarter', sub: '½♭',  solfege: 'Si',  western: 'B' },
  { id: 'B',   cls: 'natural', sub: '',    solfege: 'Si',  western: 'B' },
  { id: 'Cb',  cls: 'special', sub: '♭',   solfege: 'Do',  western: 'C' }
];

const selected = new Set();
let rootFilter = '';
let useWestern = false; // Default is Do Re Mi

const noteGrid = document.getElementById('note-grid');
const resultsList = document.getElementById('results-list');
const selectionText = document.getElementById('selection-text');
const selectionNotes = document.getElementById('selection-notes');
const clearBtn = document.getElementById('clear-btn');
const rootSelect = document.getElementById('root-select');
const notationToggle = document.getElementById('notation-toggle');

// Helper to get correct display name based on current notation
function getDisplayName(noteId) {
    const noteObj = ALL_NOTES.find(n => n.id === noteId);
    if (!noteObj) return noteId;
    return useWestern ? noteObj.western : noteObj.solfege;
}

// Helper to update Maqam names based on notation
function formatMaqamName(maqam) {
    if(!useWestern) return maqam.name;
    
    // Replace solfege with western in the name string if toggle is on
    let newName = maqam.name;
    newName = newName.replace('(Do)', '(C)')
                     .replace('(Re)', '(D)')
                     .replace('(Mi)', '(E)')
                     .replace('(Fa)', '(F)')
                     .replace('(Sol)', '(G)')
                     .replace('(La)', '(A)')
                     .replace('(Si)', '(B)')
                     .replace('(Mi♭)', '(Eb)')
                     .replace('(Si♭)', '(Bb)')
                     .replace('(Mi½♭)', '(Ehb)')
                     .replace('(Si½♭)', '(Bhb)')
                     .replace('(La½♭)', '(Ahb)');
    return newName;
}


function getRoots() {
  const roots = new Set();
  MAQAMS.forEach(m => roots.add(m.root));
  return [...roots].sort((a, b) => ALL_NOTES.findIndex(n => n.id === a) - ALL_NOTES.findIndex(n => n.id === b));
}

function populateRoots() {
  rootSelect.innerHTML = '<option value="">Any root</option>';
  getRoots().forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = getDisplayName(r) + (ALL_NOTES.find(n=>n.id===r)?.sub || '');
    rootSelect.appendChild(opt);
  });
  rootSelect.value = rootFilter; // Maintain selection
}

function renderNoteButtons() {
  noteGrid.innerHTML = '';
  ALL_NOTES.forEach(({ id, cls, sub }) => {
    const btn = document.createElement('button');
    btn.className = `note-btn ${cls}`;
    btn.dataset.note = id;
    
    const displayName = getDisplayName(id);
    btn.innerHTML = `${displayName}${sub ? `<span class="sub">${sub}</span>` : ''}`;
    
    if(selected.has(id)) btn.classList.add('selected');
    
    btn.addEventListener('click', () => toggleNote(id));
    noteGrid.appendChild(btn);
  });
}

function toggleNote(noteId) {
  if (selected.has(noteId)) selected.delete(noteId);
  else selected.add(noteId);
  update();
}

function clearSelection() {
  selected.clear();
  update();
}

function update() {
  updateButtons();
  updateSelectionDisplay();
  updateClearButton();
  updateResults();
}

function updateButtons() {
  noteGrid.querySelectorAll('.note-btn').forEach(btn => {
    btn.classList.toggle('selected', selected.has(btn.dataset.note));
  });
}

function updateSelectionDisplay() {
  if (selected.size === 0) {
    selectionText.textContent = 'No notes selected';
    selectionNotes.innerHTML = '';
    return;
  }
  selectionText.textContent = 'Selected:';
  selectionNotes.innerHTML = '';
  ALL_NOTES.forEach(({ id, sub }) => {
    if (selected.has(id)) {
      const span = document.createElement('span');
      span.className = 'selection-note';
      span.textContent = getDisplayName(id) + sub;
      selectionNotes.appendChild(span);
    }
  });
}

function updateClearButton() {
  clearBtn.classList.toggle('hidden', selected.size === 0);
}

function findMatchingMaqams() {
  if (selected.size === 0) return [];

  let candidates = MAQAMS;
  if (rootFilter) {
    candidates = candidates.filter(m => m.root === rootFilter);
  }

  const selArr = [...selected];
  return candidates.filter(maqam =>
    selArr.every(note => maqam.notes.includes(note))
  );
}

function updateResults() {
  const matching = findMatchingMaqams();

  if (selected.size === 0) {
    resultsList.innerHTML = '<p class="placeholder">Select notes to find matching Maqams.</p>';
    return;
  }

  if (matching.length === 0) {
    resultsList.innerHTML = '<p class="placeholder">No matching Maqams found.<br>Try removing a note.</p>';
    return;
  }

  const h = [`<div id="results-count">Found ${matching.length} maqam${matching.length !== 1 ? 's' : ''}</div>`];
  matching.forEach(m => {
    
    const rootSub = ALL_NOTES.find(n => n.id === m.root)?.sub || '';
    
    h.push(`<div class="result-card">
      <div class="family-badge">${m.family}</div>
      <span class="name">${formatMaqamName(m)}</span>
      <span class="root">Root: ${getDisplayName(m.root)}${rootSub}</span>
      <div class="scale">${m.notes.map(n => {
        const noteObj = ALL_NOTES.find(x => x.id === n);
        const sub = noteObj?.sub || '';
        const name = getDisplayName(n);
        return `<span class="scale-note${selected.has(n) ? ' highlight' : ''}">${name}${sub}</span>`
      }).join('')}</div>
    </div>`);
  });
  resultsList.innerHTML = h.join('');
}

// Toggle Notation Listener
notationToggle.addEventListener('change', (e) => {
    useWestern = e.target.checked;
    renderNoteButtons();
    populateRoots();
    update();
});

rootSelect.addEventListener('change', () => {
  rootFilter = rootSelect.value;
  updateResults();
});

clearBtn.addEventListener('click', clearSelection);

// Initial setup
populateRoots();
renderNoteButtons();
update();
</script>
</body>
</html>
